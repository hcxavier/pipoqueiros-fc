version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: quizz_postgres_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: node_api
    restart: always
    env_file: .env
    ports:
      - "${API_PORT}:${API_PORT}" 
    environment:
      - PORT=${API_PORT}
    depends_on:
      db:
        condition: service_healthy 

volumes:
  pgdata: